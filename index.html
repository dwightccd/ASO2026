<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASO — Quiz Interactivo</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --bg2: #0a1520;
    --bg3: #0d1e2e;
    --cyan: #00e5ff;
    --cyan2: #00b8cc;
    --green: #39ff14;
    --purple: #bf5fff;
    --red: #ff3c5a;
    --yellow: #ffd600;
    --text: #c8e6f0;
    --text-dim: #5a8a9f;
    --border: #1a3a4a;
    --border2: #0f2535;
    --glow: 0 0 20px rgba(0,229,255,0.25);
    --glow2: 0 0 40px rgba(0,229,255,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    text-align: center;
    padding: 40px 0 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 1px;
    background: var(--cyan);
    box-shadow: var(--glow);
  }

  .header-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.7;
  }

  .header-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 900;
    color: var(--cyan);
    text-shadow: 0 0 30px rgba(0,229,255,0.5), 0 0 60px rgba(0,229,255,0.2);
    letter-spacing: 6px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .header-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  .header-sub span {
    color: var(--green);
  }

  #screen-modules { display: flex; flex-direction: column; gap: 16px; }

  .modules-intro {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 8px;
  }

  .module-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--cyan);
    padding: 18px 24px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    width: 100%;
    text-align: left;
  }

  .module-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--cyan);
    box-shadow: 0 0 12px var(--cyan);
  }

  .module-btn:hover {
    background: var(--bg3);
    border-color: var(--cyan);
    box-shadow: var(--glow), inset 0 0 30px rgba(0,229,255,0.05);
    transform: translateX(3px);
  }

  .module-btn.all-mode {
    border-left-color: var(--purple);
    margin-top: 8px;
  }
  .module-btn.all-mode::before { background: var(--purple); box-shadow: 0 0 12px var(--purple); }
  .module-btn.all-mode:hover { border-color: var(--purple); box-shadow: 0 0 20px rgba(191,95,255,0.25), inset 0 0 30px rgba(191,95,255,0.05); }

  .module-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 2px;
  }

  .module-btn.all-mode .module-name { color: var(--purple); }

  .module-desc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .module-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 4px 10px;
    white-space: nowrap;
  }

  #screen-quiz { display: none; flex-direction: column; gap: 20px; }

  .quiz-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border2);
    flex-wrap: wrap;
    gap: 8px;
  }

  .quiz-module-tag {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    color: var(--cyan);
    letter-spacing: 2px;
    border: 1px solid var(--cyan);
    padding: 4px 10px;
  }

  .quiz-score-live {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--green);
  }

  .quiz-round-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--yellow);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .progress-bar-wrap {
    background: var(--bg2);
    height: 4px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--green));
    box-shadow: 0 0 8px var(--cyan);
    transition: width 0.4s ease;
  }

  .progress-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-align: right;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .question-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 28px;
    position: relative;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), transparent);
  }

  .question-type-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--purple);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
    opacity: 0.8;
  }

  .question-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 24px;
  }

  .question-text code {
    font-family: 'Share Tech Mono', monospace;
    background: rgba(0,229,255,0.08);
    border: 1px solid var(--border);
    padding: 2px 6px;
    color: var(--cyan);
    font-size: 13px;
  }

  .options-list { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: all 0.15s;
    text-align: left;
    width: 100%;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--cyan2);
    background: rgba(0,229,255,0.05);
    box-shadow: inset 0 0 20px rgba(0,229,255,0.03);
  }

  .option-btn.selected {
    border-color: var(--cyan);
    background: rgba(0,229,255,0.08);
  }

  .option-btn.correct {
    border-color: var(--green) !important;
    background: rgba(57,255,20,0.08) !important;
    box-shadow: 0 0 12px rgba(57,255,20,0.15) !important;
  }

  .option-btn.incorrect {
    border-color: var(--red) !important;
    background: rgba(255,60,90,0.08) !important;
    box-shadow: 0 0 12px rgba(255,60,90,0.15) !important;
  }

  .option-btn:disabled { cursor: default; }

  .option-key {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--cyan);
    min-width: 22px;
    margin-top: 1px;
    flex-shrink: 0;
  }

  .option-btn.correct .option-key { color: var(--green); }
  .option-btn.incorrect .option-key { color: var(--red); }

  .option-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }

  .fill-input {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 12px 16px;
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
    letter-spacing: 2px;
  }

  .fill-input:focus { border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,229,255,0.15); }
  .fill-input.correct { border-color: var(--green); background: rgba(57,255,20,0.05); }
  .fill-input.incorrect { border-color: var(--red); background: rgba(255,60,90,0.05); }

  .feedback-box {
    padding: 14px 18px;
    border-left: 3px solid;
    margin-top: 16px;
    display: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
  }

  .feedback-box.correct {
    display: block;
    border-color: var(--green);
    background: rgba(57,255,20,0.05);
    color: var(--green);
  }

  .feedback-box.incorrect {
    display: block;
    border-color: var(--red);
    background: rgba(255,60,90,0.05);
    color: var(--red);
  }

  .action-row {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 12px 24px;
    border: 1px solid;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: rgba(0,229,255,0.08);
    border-color: var(--cyan);
    color: var(--cyan);
  }

  .btn-primary:hover {
    background: rgba(0,229,255,0.18);
    box-shadow: var(--glow);
  }

  .btn-secondary {
    background: transparent;
    border-color: var(--border);
    color: var(--text-dim);
  }

  .btn-secondary:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  .btn-check {
    background: rgba(0,229,255,0.08);
    border-color: var(--cyan);
    color: var(--cyan);
  }

  .btn-check:hover { background: rgba(0,229,255,0.18); box-shadow: var(--glow); }
  .btn-check:disabled { opacity: 0.3; cursor: default; }

  #screen-results { display: none; flex-direction: column; gap: 24px; }

  .results-header {
    text-align: center;
    padding: 30px;
    background: var(--bg2);
    border: 1px solid var(--border);
    position: relative;
  }

  .results-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  }

  .results-score {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(40px, 10vw, 72px);
    font-weight: 900;
    line-height: 1;
    margin-bottom: 8px;
  }

  .results-score.excellent { color: var(--green); text-shadow: 0 0 30px rgba(57,255,20,0.4); }
  .results-score.good { color: var(--cyan); text-shadow: 0 0 30px rgba(0,229,255,0.4); }
  .results-score.poor { color: var(--red); text-shadow: 0 0 30px rgba(255,60,90,0.4); }

  .results-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  .results-summary-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 18px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }

  .results-summary-box strong { color: var(--yellow); }

  .results-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .stat-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 16px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .stat-box.correct-stat .stat-value { color: var(--green); }
  .stat-box.wrong-stat .stat-value { color: var(--red); }
  .stat-box.total-stat .stat-value { color: var(--cyan); }

  .review-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    color: var(--red);
    letter-spacing: 3px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  .review-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    padding: 16px 20px;
  }

  .review-q {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.6;
  }

  .review-your, .review-correct {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    margin-top: 4px;
    letter-spacing: 1px;
    line-height: 1.5;
  }

  .review-your { color: var(--red); }
  .review-correct { color: var(--green); }

  .results-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .footer {
    margin-top: auto;
    padding: 24px 0 16px;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    border-top: 1px solid var(--border2);
    opacity: 0.5;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease forwards; }

  @keyframes glitch {
    0%, 100% { clip-path: none; transform: none; }
    20% { clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%); transform: translateX(-3px); }
    40% { clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%); transform: translateX(3px); }
    60% { clip-path: none; transform: none; }
  }

  .header-title:hover { animation: glitch 0.4s steps(2); }

  .option-btn.multi-selected {
    border-color: var(--purple);
    background: rgba(191,95,255,0.08);
  }
  .option-btn.multi-selected .option-key { color: var(--purple); }

  @media (max-width: 700px) {
    .results-stats {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-label">// Administración de Sistemas Operativos</div>
    <div class="header-title">ASO</div>
    <div class="header-sub">ASIR 2º — Sistema de Autoevaluación <span>ACTIVO</span></div>
  </div>

  <div id="screen-modules">
    <div class="modules-intro">// Selecciona un módulo temático</div>
    <div id="module-list"></div>
  </div>

  <div id="screen-quiz">
    <div class="quiz-meta">
      <div class="quiz-module-tag" id="quiz-module-tag">MÓDULO</div>
      <div class="quiz-round-tag" id="quiz-round-tag">Ronda inicial</div>
      <div class="quiz-score-live" id="quiz-score-live">✓ 0 &nbsp; ✗ 0</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">0 / 0</div>

    <div class="question-card fade-in" id="question-card">
      <div class="question-type-tag" id="q-type-tag">TIPO</div>
      <div class="question-text" id="q-text"></div>
      <div id="q-options"></div>
      <div class="feedback-box" id="q-feedback"></div>
    </div>

    <div class="action-row">
      <button class="btn btn-secondary" onclick="goHome()">← INICIO</button>
      <button class="btn btn-check" id="btn-check" onclick="checkAnswer()">COMPROBAR</button>
      <button class="btn btn-primary" id="btn-next" onclick="nextQuestion()" style="display:none">SIGUIENTE →</button>
    </div>
  </div>

  <div id="screen-results">
    <div class="results-header">
      <div class="results-score" id="results-score">0%</div>
      <div class="results-label" id="results-label">PUNTUACIÓN FINAL</div>
    </div>

    <div class="results-summary-box" id="results-summary-box"></div>

    <div class="results-stats">
      <div class="stat-box total-stat"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total</div></div>
      <div class="stat-box correct-stat"><div class="stat-value" id="stat-correct">0</div><div class="stat-label">Correctas iniciales</div></div>
      <div class="stat-box wrong-stat"><div class="stat-value" id="stat-wrong">0</div><div class="stat-label">Errores iniciales</div></div>
    </div>
    <div id="review-section"></div>
    <div class="results-actions">
      <button class="btn btn-secondary" onclick="goHome()">← INICIO</button>
      <button class="btn btn-primary" onclick="restartQuiz()">↺ REPETIR</button>
      <button class="btn btn-primary" id="btn-repeat-wrong" onclick="restartWrongOnly()" style="display:none">↺ SOLO FALLADAS</button>
    </div>
  </div>

  <div class="footer">ASO · ASIR 2025/26 · CIDEAD</div>
</div>

<script>
const modules = [
  {
    id: 'mod1',
    name: 'MÓDULO 1',
    desc: 'Directorio Activo, LDAP y GPO',
    color: 'cyan',
    questions: [
      { type: 'single', text: '"cn=admin,dc=sored,dc=local" — ¿qué te sugiere?', options: ['Nada, falta la clave.', 'Administrar la base de datos de un LDAP.', 'Grupo admin del dominio sored.local.', 'Identificación del usuario "admin" del dominio sored.local.'], correct: 3 },
      { type: 'single', text: '¿Qué es un controlador de dominio?', options: ['Es un conjunto de ordenadores interconectados entre sí formando una entidad común.', 'Son los servidores del tipo Windows Server en cualquiera de sus versiones en la cual cada uno de los servidores tiene una función específica.', 'Es una entidad administrativa.', 'Es un servidor del tipo Windows Server en cualquiera de sus versiones.'], correct: 3 },
      { type: 'single', text: 'Si queremos crear un subdominio en Active Directory. ¿Qué afirmación es correcta?', options: ['Hay que configurar el DNS del nuevo servidor para que encuentre el servidor principal del dominio.', 'No hay que hacer nada, se realiza al finalizar el proceso de instalación del Active Directory.', 'Sólo hace falta habilitar el Netbios para encontrar el dominio principal y proseguirá con la relación de confianza.', 'Se crea el subdominio como dominio principal, al reiniciar el equipo, empezará la relación de confianza.'], correct: 0 },
      { type: 'single', text: 'Tras unir un cliente al dominio wac.local, al reiniciar se muestra una nueva opción de inicio de sesión. ¿Cuál es?', options: ['wac.local\\usuario', 'Acceso corporativo wac.local (solo invitado)', 'wac\\Administrador', 'Iniciar sesión con cuenta Microsoft', 'Iniciar sesión con PIN (wac.local)'], correct: 2 },
      { type: 'single', text: 'phpLDAPadmin permite editar...', options: ['Políticas de contraseñas sin necesidad de añadir entradas ppolicy.', 'Los archivos LDIF internos del servidor sin necesidad de acceso root.', 'Atributos LDAP de usuarios y OU.', 'Esquemas LDAP.'], correct: 2 },
      { type: 'single', text: '¿Qué entendemos por esquema en un entorno LDAP?', options: ['Es la base de datos del sistema que sirve de referencia o índice de todos los recursos, grupos y usuarios del sistema.', 'Un gráfico indicando la organización del LDAP.', 'Es un modelo transaccional entre varias bases de datos que se interrelacionan con el sistema base.', 'Es un modelo de los datos que pueden almacenarse en LDAP.'], correct: 3 },
      { type: 'single', text: 'Para aplicar una GPO en Windows Server que impida instalar software solo a los usuarios de una OU concreta, ¿qué ajuste es necesario?', options: ['Hacer que la GPO sea "enforced" para todo el Dominio.', 'Enlazar un programa WMI con su directiva.', 'Enlazar la GPO a la OU adecuada.', 'Enlazar la GPO a Nivel de Dominio.'], correct: 2 },

let sourceQuestionSet = [];

function init() {
  const list = document.getElementById('module-list');
  list.innerHTML = '';

  modules.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'module-btn';
    btn.innerHTML = `
      <div>
        <div class="module-name">${m.name}</div>
        <div class="module-desc">${m.desc}</div>
      </div>
      <div class="module-count">${m.questions.length} preguntas</div>
    `;
    btn.onclick = () => startQuiz(m.id);
    list.appendChild(btn);
  });

  const allBtn = document.createElement('button');
  const totalQ = modules.reduce((a, m) => a + m.questions.length, 0);
  allBtn.className = 'module-btn all-mode';
  allBtn.innerHTML = `
    <div>
      <div class="module-name">★ TODOS LOS MÓDULOS</div>
      <div class="module-desc">Mezcla aleatoria de todos los temas</div>
    </div>
    <div class="module-count">${totalQ} preguntas</div>
  `;
  allBtn.onclick = () => startQuiz('all');
  list.appendChild(allBtn);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function cloneQuestions(arr) {
  return arr.map(q => ({
    ...q,
    options: q.options ? [...q.options] : undefined,
    correct: Array.isArray(q.correct) ? [...q.correct] : q.correct
  }));
}

function startQuiz(moduleId) {
  let baseQuestions;

  if (moduleId === 'all') {
    currentModule = { name: 'TODOS LOS MÓDULOS', id: 'all' };
    baseQuestions = modules.flatMap(m => m.questions);
  } else {
    currentModule = modules.find(m => m.id === moduleId);
    baseQuestions = currentModule.questions;
  }

  sourceQuestionSet = cloneQuestions(baseQuestions);
  currentQuestions = shuffle(cloneQuestions(baseQuestions));

  currentIdx = 0;
  score = 0;
  wrong = 0;
  wrongItems = [];
  reviewMode = false;
  currentRound = 1;
  reviewQueue = [];
  nextReviewQueue = [];
  initialTotal = currentQuestions.length;
  initialCorrect = 0;
  initialWrong = 0;
  lastWrongQuestionSet = [];

  document.getElementById('btn-repeat-wrong').style.display = 'none';
  show('screen-quiz');
  document.getElementById('quiz-module-tag').textContent = currentModule.name;
  renderQuestion();
}

function startReviewRound() {
  reviewMode = true;
  currentRound++;
  currentQuestions = shuffle(cloneQuestions(reviewQueue));
  currentIdx = 0;
  nextReviewQueue = [];
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  multiSelected = [];

  const q = currentQuestions[currentIdx];
  const total = currentQuestions.length;

  const pct = total ? (currentIdx / total) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${currentIdx + 1} / ${total}`;
  document.getElementById('quiz-score-live').innerHTML = reviewMode
    ? `Pendientes ${currentQuestions.length - currentIdx}`
    : `✓ ${score} &nbsp; ✗ ${wrong}`;
  document.getElementById('quiz-round-tag').textContent = reviewMode
    ? `Repaso de fallos · ronda ${currentRound - 1}`
    : 'Ronda inicial';

  const typeLabels = {
    single: 'OPCIÓN MÚLTIPLE',
    truefalse: 'VERDADERO / FALSO',
    fill: 'COMPLETAR',
    multi: 'MÚLTIPLE (varias correctas)'
  };
  document.getElementById('q-type-tag').textContent = typeLabels[q.type] || '';
  document.getElementById('q-text').innerHTML = q.text;

  const fb = document.getElementById('q-feedback');
  fb.className = 'feedback-box';
  fb.textContent = '';

  const optDiv = document.getElementById('q-options');
  optDiv.innerHTML = '';

  const btnCheck = document.getElementById('btn-check');
  const btnNext = document.getElementById('btn-next');
  btnCheck.style.display = 'inline-block';
  btnCheck.disabled = (q.type !== 'fill');
  btnNext.style.display = 'none';

  if (q.type === 'fill') {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'fill-input';
    inp.placeholder = q.hint || 'Escribe tu respuesta...';
    inp.id = 'fill-answer';
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
    inp.addEventListener('input', () => { btnCheck.disabled = inp.value.trim() === ''; });
    optDiv.appendChild(inp);
    setTimeout(() => inp.focus(), 50);
  } else {
    const keys = ['A', 'B', 'C', 'D', 'E'];
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="option-key">${keys[i]}</span><span class="option-text">${opt}</span>`;
      btn.dataset.idx = i;

      if (q.type === 'multi') {
        btn.onclick = () => {
          if (answered) return;
          const idx = multiSelected.indexOf(i);
          if (idx === -1) {
            multiSelected.push(i);
            btn.classList.add('multi-selected');
          } else {
            multiSelected.splice(idx, 1);
            btn.classList.remove('multi-selected');
          }
          btnCheck.disabled = multiSelected.length === 0;
        };
        btnCheck.disabled = true;
      } else {
        btn.onclick = () => {
          if (answered) return;
          document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          btnCheck.disabled = false;
        };
      }

      optDiv.appendChild(btn);
    });
  }

  const card = document.getElementById('question-card');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');
}

function checkAnswer() {
  if (answered) return;
  answered = true;

  const q = currentQuestions[currentIdx];
  const fb = document.getElementById('q-feedback');
  let isCorrect = false;

  if (q.type === 'fill') {
    const inp = document.getElementById('fill-answer');
    const userVal = inp.value.trim().toLowerCase();
    const correctVal = q.correct.toLowerCase();
    isCorrect = userVal === correctVal || userVal.replace(/\s+/g, '') === correctVal.replace(/\s+/g, '');
    inp.disabled = true;
    inp.classList.add(isCorrect ? 'correct' : 'incorrect');
  } else if (q.type === 'multi') {
    const correctSet = new Set(q.correct);
    const userSet = new Set(multiSelected);
    isCorrect = correctSet.size === userSet.size && [...correctSet].every(v => userSet.has(v));
    document.querySelectorAll('.option-btn').forEach(btn => {
      const idx = parseInt(btn.dataset.idx, 10);
      btn.disabled = true;
      if (q.correct.includes(idx)) btn.classList.add('correct');
      else if (multiSelected.includes(idx)) btn.classList.add('incorrect');
    });
  } else {
    const selected = document.querySelector('.option-btn.selected');
    const selectedIdx = selected ? parseInt(selected.dataset.idx, 10) : -1;
    isCorrect = selectedIdx === q.correct;

    document.querySelectorAll('.option-btn').forEach(btn => {
      const idx = parseInt(btn.dataset.idx, 10);
      btn.disabled = true;
      if (idx === q.correct) btn.classList.add('correct');
      else if (idx === selectedIdx) btn.classList.add('incorrect');
    });
  }

  if (isCorrect) {
    if (!reviewMode) score++;
    fb.className = 'feedback-box correct';
    fb.textContent = reviewMode ? '✓ Correcto — Esta pregunta sale del repaso' : '✓ Correcto';
  } else {
    const correctAnswer = getCorrectAnswerText(q);
    fb.className = 'feedback-box incorrect';
    fb.textContent = `✗ Incorrecto — Respuesta correcta: ${correctAnswer}`;

    if (!reviewMode) {
      wrong++;
      wrongItems.push({
        question: q.text,
        userAnswer: getUserAnswerText(q),
        correctAnswer: correctAnswer
      });
      reviewQueue.push(cloneQuestions([q])[0]);
    } else {
      nextReviewQueue.push(cloneQuestions([q])[0]);
    }
  }

  if (!reviewMode) {
    document.getElementById('quiz-score-live').innerHTML = `✓ ${score} &nbsp; ✗ ${wrong}`;
  } else {
    document.getElementById('quiz-score-live').innerHTML = `Pendientes ${currentQuestions.length - currentIdx}`;
  }

  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-block';

  if (currentIdx + 1 >= currentQuestions.length) {
    if (!reviewMode && reviewQueue.length > 0) {
      document.getElementById('btn-next').textContent = 'REPASAR FALLADAS →';
    } else if (reviewMode && nextReviewQueue.length > 0) {
      document.getElementById('btn-next').textContent = 'OTRA RONDA →';
    } else {
      document.getElementById('btn-next').textContent = 'VER RESULTADOS →';
    }
  } else {
    document.getElementById('btn-next').textContent = 'SIGUIENTE →';
  }
}

function getCorrectAnswerText(q) {
  if (q.type === 'fill') return q.correct;
  if (q.type === 'multi') return q.correct.map(i => q.options[i]).join(', ');
  return q.options[q.correct];
}

function getUserAnswerText(q) {
  if (q.type === 'fill') {
    const inp = document.getElementById('fill-answer');
    return inp ? (inp.value || '(vacío)') : '(vacío)';
  }
  if (q.type === 'multi') {
    if (multiSelected.length === 0) return '(sin selección)';
    return multiSelected.map(i => q.options[i]).join(', ');
  }
  const sel = document.querySelector('.option-btn.selected, .option-btn.incorrect:not(.correct)');
  if (!sel) return '(sin selección)';
  return q.options[parseInt(sel.dataset.idx, 10)] || '(sin selección)';
}

function nextQuestion() {
  currentIdx++;

  if (currentIdx >= currentQuestions.length) {
    if (!reviewMode) {
      initialCorrect = score;
      initialWrong = wrong;
      lastWrongQuestionSet = cloneQuestions(reviewQueue);

      if (reviewQueue.length > 0) {
        startReviewRound();
      } else {
        showResults();
      }
    } else {
      if (nextReviewQueue.length > 0) {
        reviewQueue = cloneQuestions(nextReviewQueue);
        startReviewRound();
      } else {
        showResults();
      }
    }
  } else {
    renderQuestion();
  }
}

function showResults() {
  show('screen-results');
  const pct = Math.round((initialCorrect / initialTotal) * 100);

  const scoreEl = document.getElementById('results-score');
  scoreEl.textContent = pct + '%';
  scoreEl.className = 'results-score ' + (pct >= 75 ? 'excellent' : pct >= 50 ? 'good' : 'poor');

  document.getElementById('results-label').textContent = `${initialCorrect} de ${initialTotal} respuestas correctas en la primera vuelta`;
  document.getElementById('stat-total').textContent = initialTotal;
  document.getElementById('stat-correct').textContent = initialCorrect;
  document.getElementById('stat-wrong').textContent = initialWrong;

  const summary = document.getElementById('results-summary-box');
  if (initialWrong > 0) {
    summary.innerHTML = `Has terminado el test y además has completado el <strong>repaso automático de fallos</strong>.<br>Errores iniciales: <strong>${initialWrong}</strong>.<br>Rondas de repaso necesarias: <strong>${Math.max(0, currentRound - 1)}</strong>.<br>Estado final: <strong>todas las preguntas acabaron acertadas</strong>.`;
  } else {
    summary.innerHTML = `Test perfecto a la primera. No ha hecho falta activar el repaso de fallos.<br>Estado final: <strong>todas correctas en la vuelta inicial</strong>.`;
  }

  const rev = document.getElementById('review-section');
  rev.innerHTML = '';

  if (wrongItems.length > 0) {
    const title = document.createElement('div');
    title.className = 'review-title';
    title.textContent = `// PREGUNTAS FALLADAS EN LA PRIMERA VUELTA (${wrongItems.length})`;
    rev.appendChild(title);

    wrongItems.forEach(item => {
      const el = document.createElement('div');
      el.className = 'review-item';
      el.innerHTML = `
        <div class="review-q">${item.question}</div>
        <div class="review-your">✗ Tu respuesta: ${item.userAnswer}</div>
        <div class="review-correct">✓ Correcta: ${item.correctAnswer}</div>
      `;
      rev.appendChild(el);
    });

    document.getElementById('btn-repeat-wrong').style.display = 'inline-block';
  } else {
    document.getElementById('btn-repeat-wrong').style.display = 'none';
  }
}

function restartQuiz() {
  startQuiz(currentModule.id);
}

function restartWrongOnly() {
  if (!lastWrongQuestionSet.length) return;

  currentModule = {
    ...currentModule,
    id: currentModule.id,
    name: `${currentModule.name} · SOLO FALLADAS`
  };

  sourceQuestionSet = cloneQuestions(lastWrongQuestionSet);
  currentQuestions = shuffle(cloneQuestions(lastWrongQuestionSet));
  currentIdx = 0;
  score = 0;
  wrong = 0;
  wrongItems = [];
  reviewMode = false;
  currentRound = 1;
  reviewQueue = [];
  nextReviewQueue = [];
  initialTotal = currentQuestions.length;
  initialCorrect = 0;
  initialWrong = 0;

  show('screen-quiz');
  document.getElementById('quiz-module-tag').textContent = currentModule.name;
  renderQuestion();
}

function goHome() {
  show('screen-modules');
  document.getElementById('btn-repeat-wrong').style.display = 'none';
}

function show(screenId) {
  ['screen-modules', 'screen-quiz', 'screen-results'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  const el = document.getElementById(screenId);
  el.style.display = 'flex';
  el.classList.remove('fade-in');
  void el.offsetWidth;
  el.classList.add('fade-in');
}

init();
</script>
